<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mapa Conceptual – Ambiente Pedagógico</title>

<style>

body{
margin:0;
background:#eef3f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

svg{
max-width:1100px;
height:auto;
}

</style>

</head>

<body>

<svg viewBox="0 0 1100 800">

<!-- fondo -->
<rect width="1100" height="800" fill="#eef3f8"/>

<!-- círculo central -->
<defs>
<radialGradient id="grad">
<stop offset="0%" stop-color="#3da4dc"/>
<stop offset="100%" stop-color="#1b6ca8"/>
</radialGradient>
</defs>

<circle cx="550" cy="400" r="100" fill="url(#grad)"/>

<text x="550" y="390" text-anchor="middle" fill="white" font-size="20" font-weight="bold">
AMBIENTE
</text>

<text x="550" y="420" text-anchor="middle" fill="white" font-size="20" font-weight="bold">
PEDAGÓGICO
</text>

<!-- cajas -->

<rect x="100" y="100" width="250" height="120" rx="15" fill="white"/>
<text x="120" y="130" font-size="16" font-weight="bold">Territorio</text>

<rect x="750" y="100" width="250" height="120" rx="15" fill="white"/>
<text x="770" y="130" font-size="16" font-weight="bold">Espacio educativo</text>

<rect x="750" y="350" width="250" height="120" rx="15" fill="white"/>
<text x="770" y="380" font-size="16" font-weight="bold">Dotación</text>

<rect x="750" y="600" width="250" height="120" rx="15" fill="white"/>
<text x="770" y="630" font-size="16" font-weight="bold">Interacciones</text>

<rect x="100" y="600" width="250" height="120" rx="15" fill="white"/>
<text x="120" y="630" font-size="16" font-weight="bold">Cultura y contexto</text>

<rect x="100" y="350" width="250" height="120" rx="15" fill="white"/>
<text x="120" y="380" font-size="16" font-weight="bold">Intencionalidad pedagógica</text>

<!-- flechas -->

<line x1="350" y1="160" x2="470" y2="320" stroke="orange" stroke-width="4"/>
<line x1="750" y1="160" x2="630" y2="320" stroke="gold" stroke-width="4"/>
<line x1="750" y1="410" x2="650" y2="400" stroke="green" stroke-width="4"/>
<line x1="750" y1="650" x2="630" y2="480" stroke="purple" stroke-width="4"/>
<line x1="350" y1="650" x2="470" y2="480" stroke="orange" stroke-width="4"/>
<line x1="350" y1="410" x2="470" y2="400" stroke="teal" stroke-width="4"/>

</svg>

</body>
</html>
